services:
  titanium-gym:
    container_name: titanium-gym-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      # Gerçek E-posta gönderimi istenirse aşağıdaki alanlar doldurulabilir:
      # - EMAIL_USER=your-email@gmail.com
      # - EMAIL_PASS=your-gmail-app-password
    restart: always
